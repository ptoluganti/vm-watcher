apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yaml
  - 01-rbac.yaml
  - 02-postgres.yaml
  - 03-kafka.yaml
  # 04-clf.yaml targets openshift-logging (a system namespace) and requires
  # the Red Hat OpenShift Logging Operator CRD.  It is included here so a
  # single `kubectl apply -k deployment/` installs the full pipeline.
  # Remove it if the Logging Operator is not yet installed.
  - 04-clf.yaml
  - 05-audit-sink.yaml
