# Strimzi Kafka cluster for the vm-audit pipeline.
#
# Prerequisites: Strimzi operator must be installed cluster-wide before
# applying this file.  Install with:
#   kubectl apply -f https://github.com/strimzi/strimzi-kafka-operator/releases/download/<ver>/strimzi-cluster-operator-<ver>.yaml
# then patch the WATCH_NAMESPACE to vm-audit (or use the cluster-wide operator).
#
# Single combined controller+broker node (KRaft, no ZooKeeper) — suitable for
# dev/CI.  For production use separate controller and broker pools with
# replicas >= 3 and persistent storage.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  namespace: vm-audit
  labels:
    strimzi.io/cluster: vm-audit-cluster
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: vm-audit-cluster
  namespace: vm-audit
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
  entityOperator:
    topicOperator: {}
---
# vm-audit-raw is the durable buffer between Vector (OCP Logging) and the
# audit-sink consumer group.  6 partitions allow up to 6 sink replicas to
# consume in parallel without rebalancing.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: vm-audit-raw
  namespace: vm-audit
  labels:
    strimzi.io/cluster: vm-audit-cluster
spec:
  partitions: 6
  replicas: 1
  config:
    # 7-day retention gives a wide replay window for recovery.
    retention.ms: "604800000"
    segment.bytes: "104857600"
    cleanup.policy: delete
