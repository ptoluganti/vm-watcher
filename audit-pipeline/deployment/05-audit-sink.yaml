apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-sink
  namespace: vm-audit
  labels:
    app: audit-sink
spec:
  # Scale replicas up to the number of topic partitions (6) for parallel
  # consumption.  Each replica joins the same consumer group and owns a
  # disjoint partition subset.
  replicas: 1
  selector:
    matchLabels:
      app: audit-sink
  template:
    metadata:
      labels:
        app: audit-sink
    spec:
      serviceAccountName: audit-sink
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: audit-sink
          image: vm-audit-sink:dev
          imagePullPolicy: Never
          env:
            # ── Kafka (Strimzi bootstrap) ────────────────────────────────────
            - name: KAFKA_BROKERS
              value: "vm-audit-cluster-kafka-bootstrap.vm-audit.svc:9092"
            - name: KAFKA_TOPIC
              value: "vm-audit-raw"
            - name: KAFKA_GROUP_ID
              value: "vm-audit-sink"
            # Low MaxWait keeps per-event latency under 500 ms at low volumes.
            - name: KAFKA_MAX_WAIT
              value: "500ms"
            # ── PostgreSQL ───────────────────────────────────────────────────
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: dsn
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
