apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: vm-watcher
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: vm-watcher
        metrics_path: /metrics
        static_configs:
          - targets: ["vm-watcher.vm-watcher.svc.cluster.local:8080"]
