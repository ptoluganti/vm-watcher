# Strimzi Kafka cluster for vm-audit events.
#
# Prerequisites: Strimzi operator must be installed first.
# Bootstrap address: vm-audit-cluster-kafka-bootstrap.vm-watcher.svc:9092
#
# Single combined controller+broker node (KRaft, no ZooKeeper) — suitable for dev/CI.
# For production: separate controller and broker pools with replicas >= 3.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  namespace: vm-watcher
  labels:
    strimzi.io/cluster: vm-audit-cluster
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: vm-audit-cluster
  namespace: vm-watcher
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
  entityOperator:
    topicOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: vm-audit-raw
  namespace: vm-watcher
  labels:
    strimzi.io/cluster: vm-audit-cluster
spec:
  partitions: 6
  replicas: 1
  config:
    # 7-day retention; rotate segments at 100 MB
    retention.ms: "604800000"
    segment.bytes: "104857600"
    # Compact+delete: keep the last state per key after retention expires
    cleanup.policy: delete
