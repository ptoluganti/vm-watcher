# PostgreSQL — single-node, dev-grade (emptyDir storage).
# Swap the emptyDir volume for a PVC in production.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: vm-watcher
type: Opaque
stringData:
  password: "changeme"         # override in production via external secret manager
  dsn: "postgres://vmwatcher:changeme@postgres:5432/vmwatcher?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vm-watcher
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # postgres uid in the official image
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: vmwatcher
            - name: POSTGRES_USER
              value: vmwatcher
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vmwatcher", "-d", "vmwatcher"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}           # replace with a PVC for persistent storage
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vm-watcher
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
  type: NodePort               # exposes port 5432 on the host via kind extraPortMappings
